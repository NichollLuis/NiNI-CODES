<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: #fafafa;
        }
        header {
            background-color: #fff;
            border-bottom: 1px solid #e5e5e5;
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-container {
            max-width: 975px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
        }
        .search-bar {
            width: 268px;
            background-color: #efefef;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 8px 16px;
            text-align: center;
            font-size: 14px;
        }
        .icons {
            display: flex;
            gap: 20px;
            font-size: 20px;
            cursor: pointer;
        }
        .container {
            max-width: 975px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 293px;
            gap: 64px;
        }
        .feed {
            max-width: 470px;
        }
        .post {
            background-color: #fff;
            border: 1px solid #e5e5e5;
            margin-bottom: 40px;
            border-radius: 4px;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #e5e5e5;
        }
        .post-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #e5e5e5;
        }
        .post-image {
            width: 100%;
            aspect-ratio: 1;
            background-color: #e5e5e5;
        }
        .post-actions {
            padding: 16px;
            font-size: 18px;
            display: flex;
            gap: 16px;
            cursor: pointer;
        }
        .post-caption {
            padding: 0 16px 16px;
            font-size: 14px;
        }
        .sidebar {
            max-width: 293px;
        }
        .user-card {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
        }
        .follow-btn {
            background-color: transparent;
            border: none;
            color: #0095f6;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">Snapagram</div>
            <input type="text" class="search-bar" placeholder="Search">
            <div class="icons">
                <span>❤️</span>
                <span>💬</span>
                <span>📤</span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="feed">
            <div class="post">
                <div class="post-header">
                    <div class="post-author">
                        <div class="avatar"></div>
                        <span><strong>username</strong></span>
                    </div>
                    <span>⋯</span>
                </div>
                <div class="post-image"></div>
                <div class="post-actions">
                    <span>❤️</span>
                    <span>💬</span>
                    <span>📤</span>
                </div>
                <div class="post-caption">
                    <strong>username</strong> Great moment!
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="user-card">
                <div class="avatar"></div>
                <div>
                    <div><strong>myusername</strong></div>
                    <div style="font-size: 12px; color: #737373;">My Account</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
